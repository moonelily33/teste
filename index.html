<aside class="main-header">
    <h1>JNJM<span>ARCHIVE</span></h1>
    
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Search...">
    </div>

    <div class="mobile-filter-wrapper">
        <div class="filter-item">
            <p class="nav-label">Member</p>
            <select id="memberSelect" onchange="filterByMember(this.value, null)">
                <option value="All">All Members</option>
                <option value="JENO">JENO</option>
                <option value="JAEMIN">JAEMIN</option>
                <option value="UNIT">UNIT</option>
            </select>
        </div>

        <div class="filter-item">
            <p class="nav-label">Era</p>
            <select id="eraSelect" onchange="filterByEra(this.value)">
                <option value="All">All Eras</option>
                <option value="BOTH SIDES">BOTH SIDES</option>
            </select>
        </div>
    </div>
</aside>
